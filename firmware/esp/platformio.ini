[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
framework = arduino

lib_extra_dirs = ../external

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43

monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -I../external/src
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

[env:esp32-test]
platform = espressif32
board = esp32dev
framework = arduino
test_framework = unity

lib_extra_dirs = ../external

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
